<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sundial — Golden Eagle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; color: #111827; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* Nav items */
    .nav-item { padding: 4px 10px; font-size: 13px; color: #374151; cursor: pointer; border-radius: 4px; }
    .nav-item:hover { background: #f3f4f6; }
    .nav-item.active { background: #dbeafe; color: #1d4ed8; }
    .nav-section { font-size: 11px; font-weight: 600; color: #9ca3af; letter-spacing: .05em; text-transform: uppercase; padding: 8px 10px 4px; }

    /* Proposed edits module */
    .pe-module { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
    .pe-module-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
    .pe-file-block { border-bottom: 1px solid #f3f4f6; }
    .pe-file-block:last-child { border-bottom: none; }
    .pe-file-header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: white; }
    .pe-file-name { font-size: 13px; font-weight: 500; color: #111827; flex: 1; }
    .pe-edit-label { font-size: 10px; font-weight: 600; color: #9ca3af; letter-spacing: .05em; text-transform: uppercase; padding: 6px 14px 2px; display: block; }
    .pe-edit-removed { background: #fef2f2; color: #991b1b; padding: 4px 14px 4px 28px; display: block; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .pe-edit-added   { background: #f0fdf4; color: #166534; padding: 4px 14px 4px 28px; display: block; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .pe-accept-btn { font-size: 11px; font-weight: 500; color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 2px 9px; cursor: pointer; }
    .pe-accept-btn:hover { background: #dcfce7; }
    .pe-skip-btn   { font-size: 11px; color: #9ca3af; background: none; border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 9px; cursor: pointer; }
    .pe-skip-btn:hover { background: #f9fafb; color: #6b7280; }
    .pe-file-accepted .pe-file-name { color: #9ca3af; }
    .pe-file-accepted .pe-file-header { background: #f9fafb; }
    .pe-file-accepted .pe-edits-body { display: none; }
    .pe-file-skipped { opacity: 0.4; }
    .pe-file-skipped .pe-edits-body { display: none; }
    .pe-invalid { background: #fffbeb; }
    .pe-invalid .pe-file-name { color: #92400e; }

    /* Edit mode */
    #edit-textarea { width:100%; border:1px solid #e5e7eb; border-radius:6px; padding:12px; font-size:13px; font-family:ui-monospace,'SF Mono',monospace; line-height:1.6; resize:vertical; outline:none; min-height:320px; }
    #edit-textarea:focus { border-color:#93c5fd; box-shadow:0 0 0 2px #dbeafe; }

    /* Markdown content */
    .md-content h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .md-content h2 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
    .md-content h3 { font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    .md-content p  { margin-bottom: 8px; line-height: 1.6; color: #374151; }
    .md-content ul { padding-left: 18px; margin-bottom: 8px; }
    .md-content li { margin-bottom: 3px; line-height: 1.5; color: #374151; }

    /* Call timeline */
    .tl-entry { position: relative; padding-left: 20px; padding-bottom: 14px; cursor: pointer; }
    .tl-entry:last-child { padding-bottom: 0; }
    .tl-dot { position: absolute; left: 0; top: 4px; width: 11px; height: 11px; border-radius: 50%; background: #d1d5db; border: 2px solid white; box-shadow: 0 0 0 1px #d1d5db; }
    .tl-dot.applied { background: #22c55e; box-shadow: 0 0 0 1px #22c55e; }
    .tl-dot.pending  { background: #f59e0b; box-shadow: 0 0 0 1px #f59e0b; }
    .tl-line { position: absolute; left: 5px; top: 15px; width: 1px; bottom: 0; background: #e5e7eb; }
    .tl-entry:hover .tl-label { color: #2563eb; }
    .tl-label { font-size: 13px; font-weight: 500; color: #111827; line-height: 1.3; }
    .tl-meta  { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    /* Version history panel */
    .ver-item { padding: 8px 10px; cursor: pointer; border-left: 3px solid transparent; border-radius: 0 4px 4px 0; margin-bottom: 2px; }
    .ver-item:hover { background: #f3f4f6; }
    .ver-item.selected { background: #eff6ff; border-left-color: #3b82f6; }
    .ver-label { font-size: 13px; font-weight: 500; color: #111827; }
    .ver-meta  { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .ver-diff-row { background: #f0fdf4; border-left: 3px solid #22c55e; padding: 5px 10px; border-radius: 0 5px 5px 0; font-size: 12px; margin-bottom: 4px; }

    /* Modal */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; display: none; align-items: center; justify-content: center; }
    #modal-overlay.open { display: flex; }
    #modal-box { background: white; border-radius: 12px; width: 600px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }

    /* Confidence badge */
    .conf-high   { background: #dcfce7; color: #15803d; }
    .conf-medium { background: #fef9c3; color: #92400e; }
    .conf-low    { background: #fee2e2; color: #991b1b; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #6b7280; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-white">

  <!-- TOP BAR -->
  <div style="height:48px; border-bottom:1px solid #e5e7eb; background:white; display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; z-index:10;">
    <div style="font-weight:600; font-size:15px;">Sundial</div>
    <div style="font-size:13px; color:#9ca3af;">Golden Eagle Log Homes</div>
    <div style="flex:1;"></div>
    <button onclick="openModal()"
      style="background:#111827; color:white; border:none; border-radius:6px; padding:6px 14px; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px;"
      onmouseenter="this.style.background='#374151'" onmouseleave="this.style.background='#111827'">
      ↑ Process Call
    </button>
    <div style="width:30px;height:30px;border-radius:50%;background:#dbeafe;border:2px solid #93c5fd;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#1d4ed8;">AO</div>
  </div>

  <!-- THREE-COLUMN LAYOUT -->
  <div class="flex flex-1 overflow-hidden">

    <!-- LEFT PANEL -->
    <div style="width:220px; flex-shrink:0; border-right:1px solid #e5e7eb; overflow-y:auto; padding:12px 8px;">
      <div class="nav-section">Calls</div>
      <div id="calls-nav" style="padding:4px 0 8px;"></div>
      <div class="nav-section" style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;padding-right:4px;">
        <span>Project Files</span>
        <button onclick="toggleNewFileForm()" title="New file"
          style="background:none;border:none;font-size:16px;color:#9ca3af;cursor:pointer;line-height:1;padding:0 2px;border-radius:3px;"
          onmouseenter="this.style.color='#374151'" onmouseleave="this.style.color='#9ca3af'">+</button>
      </div>
      <!-- Inline new-file form -->
      <div id="new-file-form" style="display:none;padding:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;margin:4px 0 6px;">
        <input id="new-file-name" type="text" placeholder="Name (e.g. Lucas Eichinger)"
          style="width:100%;border:1px solid #e5e7eb;border-radius:4px;padding:5px 8px;font-size:12px;outline:none;margin-bottom:6px;"
          onfocus="this.style.borderColor='#93c5fd'" onblur="this.style.borderColor='#e5e7eb'"
          onkeydown="if(event.key==='Enter')createFile();if(event.key==='Escape')toggleNewFileForm()">
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <label style="font-size:12px;color:#374151;display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="file-location" value="people" checked style="margin:0;"> Person
          </label>
          <label style="font-size:12px;color:#374151;display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="radio" name="file-location" value="root" style="margin:0;"> General
          </label>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="createFile()"
            style="flex:1;background:#111827;color:white;border:none;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer;">Create</button>
          <button onclick="toggleNewFileForm()"
            style="background:none;border:1px solid #e5e7eb;border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer;color:#6b7280;">Cancel</button>
        </div>
        <div id="new-file-error" style="font-size:11px;color:#ef4444;margin-top:4px;display:none;"></div>
      </div>
      <div id="files-nav"></div>
    </div>

    <!-- CENTER: CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- State: idle / extracting / review / applying / done -->
      <div id="content" class="flex-1 overflow-y-auto px-8 py-6">
        <div style="color:#9ca3af; font-size:13px; margin-top:40px; text-align:center;">
          Select a file from the left, or click <strong>Process Call</strong> to analyze a transcript.
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL: VERSION HISTORY -->
    <div style="width:240px; flex-shrink:0; border-left:1px solid #e5e7eb; overflow-y:auto; background:#fafafa;">
      <div style="padding:12px 14px 8px; font-size:11px; font-weight:600; color:#6b7280; letter-spacing:.05em; text-transform:uppercase; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between;">
        Version History
      </div>
      <div id="history-panel" style="padding:6px 0;"></div>
    </div>

  </div>

  <!-- MODAL: Paste Transcript -->
  <div id="modal-overlay">
    <div id="modal-box">
      <div style="padding:16px 20px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between;">
        <div>
          <div style="font-weight:600; font-size:15px;">Process Call</div>
          <div style="font-size:12px; color:#9ca3af; margin-top:2px;">Paste a transcript — Claude will extract proposed edits</div>
        </div>
        <button onclick="closeModal()" style="background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;line-height:1;">×</button>
      </div>
      <div style="padding:16px 20px; display:flex; flex-direction:column; gap:12px; flex:1; overflow:hidden;">
        <div style="display:flex; gap:10px;">
          <div style="flex:1;">
            <label style="font-size:12px; font-weight:500; color:#374151; display:block; margin-bottom:4px;">Call name (optional)</label>
            <input id="call-name-input" type="text" placeholder="e.g. Sean Flaherty — Discovery"
              style="width:100%; border:1px solid #e5e7eb; border-radius:6px; padding:7px 10px; font-size:13px; outline:none;"
              onfocus="this.style.borderColor='#93c5fd'" onblur="this.style.borderColor='#e5e7eb'">
          </div>
          <div style="width:140px;">
            <label style="font-size:12px; font-weight:500; color:#374151; display:block; margin-bottom:4px;">Date (optional)</label>
            <input id="call-date-input" type="date"
              style="width:100%; border:1px solid #e5e7eb; border-radius:6px; padding:7px 10px; font-size:13px; outline:none; color:#374151;"
              onfocus="this.style.borderColor='#93c5fd'" onblur="this.style.borderColor='#e5e7eb'">
          </div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
          <label style="font-size:12px; font-weight:500; color:#374151; display:block; margin-bottom:4px;">Transcript</label>
          <!-- Drop zone -->
          <div id="drop-zone"
            ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"
            onclick="document.getElementById('file-input').click()"
            style="border:2px dashed #e5e7eb; border-radius:6px; padding:12px 14px; text-align:center; font-size:12px; color:#9ca3af; cursor:pointer; margin-bottom:8px; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px;">
            <span id="drop-label">Drop a .txt file here, or click to browse</span>
          </div>
          <input id="file-input" type="file" accept=".txt" style="display:none;" onchange="handleFileSelect(event)">
          <textarea id="transcript-input"
            placeholder="Or paste the transcript here..."
            style="flex:1; min-height:220px; border:1px solid #e5e7eb; border-radius:6px; padding:10px; font-size:13px; resize:none; outline:none; font-family:inherit; line-height:1.5;"
            onfocus="this.style.borderColor='#93c5fd'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
        </div>
      </div>
      <div style="padding:12px 20px; border-top:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between;">
        <div id="modal-status" style="font-size:12px; color:#9ca3af;"></div>
        <div style="display:flex; gap:8px;">
          <button onclick="closeModal()" style="background:none;border:1px solid #e5e7eb;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;color:#374151;">Cancel</button>
          <button id="extract-btn" onclick="runExtraction()"
            style="background:#111827;color:white;border:none;border-radius:6px;padding:6px 16px;font-size:13px;font-weight:500;cursor:pointer;">
            Extract edits
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let files = {}            // relPath → content
let currentFile = null    // relPath of selected file
let pendingEdits = []     // edits from last extraction
let currentCallId = null
let peFileStates = {}     // filePath → 'pending' | 'accepted' | 'skipped'
let allCalls = []         // full calls log
let selectedVersionId = null
let autosaveTimer = null  // debounce handle

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadFiles(), loadCalls()])
}

async function loadFiles() {
  const res = await fetch('/api/files')
  files = await res.json()
  renderFilesNav()
}

async function loadCalls() {
  const res = await fetch('/api/calls')
  allCalls = await res.json()
  renderCallsNav(allCalls)
  renderVersionHistory(allCalls)
}

// ── Left nav ─────────────────────────────────────────────────────────────────
function renderFilesNav() {
  const container = document.getElementById('files-nav')
  // Sort: project-overview first, then people/
  const sorted = Object.keys(files).sort((a, b) => {
    if (a.includes('project-overview')) return -1
    if (b.includes('project-overview')) return 1
    return a.localeCompare(b)
  })
  container.innerHTML = sorted.map(rel => {
    const label = rel.replace('people/', '').replace('.md', '')
    return `<div class="nav-item ${currentFile === rel ? 'active' : ''}" onclick="selectFile('${rel}')">${label}</div>`
  }).join('')
}

function renderCallsNav(calls) {
  const container = document.getElementById('calls-nav')
  if (!calls.length) {
    container.innerHTML = `<div style="font-size:12px;color:#d1d5db;padding:4px 10px;">No calls yet</div>`
    return
  }
  const sorted = [...calls].reverse()
  container.innerHTML = sorted.map((c, i) => {
    const date = c.date
      ? new Date(c.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : new Date(c.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    const dotClass = c.status === 'applied' ? 'applied' : 'pending'
    const isLast = i === sorted.length - 1
    return `
      <div class="tl-entry" onclick="selectCall('${c.id}')">
        <div class="tl-dot ${dotClass}"></div>
        ${!isLast ? '<div class="tl-line"></div>' : ''}
        <div class="tl-label">${c.name}</div>
        <div class="tl-meta">${date}</div>
      </div>`
  }).join('')
}

function renderVersionHistory(calls) {
  const panel = document.getElementById('history-panel')
  const applied = [...calls].filter(c => c.status === 'applied').reverse()

  if (!applied.length) {
    panel.innerHTML = `<div style="font-size:12px;color:#d1d5db;padding:10px 14px;">No applied calls yet</div>`
    return
  }

  panel.innerHTML = applied.map((c, i) => {
    const date = c.date
      ? new Date(c.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : new Date(c.applied_at || c.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
    const editCount = c.applied_edits?.length || 0
    const isSelected = selectedVersionId === c.id
    const currentBadge = i === 0
      ? `<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:8px;background:#dcfce7;color:#15803d;border:1px solid #bbf7d0;margin-top:3px;display:inline-block;">CURRENT</span>`
      : ''
    return `
      <div class="ver-item ${isSelected ? 'selected' : ''}" onclick="selectVersion('${c.id}')">
        <div class="ver-label">${c.name}</div>
        <div class="ver-meta">${date} · ${editCount} change${editCount !== 1 ? 's' : ''}</div>
        ${currentBadge}
      </div>`
  }).join('')
}

function selectVersion(callId) {
  selectedVersionId = callId
  renderVersionHistory(allCalls)
  const call = allCalls.find(c => c.id === callId)
  if (call) showCallDetail(call)
}

function selectFile(rel) {
  currentFile = rel
  renderFilesNav()
  renderFileContent(rel)
}

function selectCall(callId) {
  // Show the extraction review for this call from history (read-only)
  fetch('/api/calls').then(r => r.json()).then(calls => {
    const call = calls.find(c => c.id === callId)
    if (!call) return
    showCallDetail(call)
  })
}

// ── File content view ─────────────────────────────────────────────────────────
function renderFileContent(rel) {
  const content = files[rel] || ''
  const html = marked.parse(content)
  document.getElementById('content').innerHTML = `
    <div style="max-width:640px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:11px;color:#9ca3af;">${rel}</div>
        <button onclick="enterEditMode('${rel}')"
          style="font-size:12px;color:#6b7280;background:none;border:1px solid #e5e7eb;border-radius:5px;padding:3px 10px;cursor:pointer;"
          onmouseenter="this.style.background='#f9fafb'" onmouseleave="this.style.background='none'">Edit</button>
      </div>
      <div class="md-content" id="md-rendered">${html}</div>
    </div>`
}

function enterEditMode(rel) {
  clearTimeout(autosaveTimer)
  const content = files[rel] || ''
  document.getElementById('content').innerHTML = `
    <div style="max-width:640px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:11px;color:#9ca3af;">${rel}</div>
        <div style="display:flex;gap:10px;align-items:center;">
          <div id="save-status" style="font-size:11px;color:#d1d5db;">—</div>
          <button onclick="renderFileContent('${rel}')"
            style="font-size:12px;color:#6b7280;background:none;border:1px solid #e5e7eb;border-radius:5px;padding:3px 10px;cursor:pointer;"
            onmouseenter="this.style.background='#f9fafb'" onmouseleave="this.style.background='none'">Done</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button onclick="insertSection()"
          style="font-size:11px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:3px 10px;cursor:pointer;"
          onmouseenter="this.style.background='#f3f4f6'" onmouseleave="this.style.background='#f9fafb'">+ Section</button>
        <button onclick="insertBullet()"
          style="font-size:11px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:3px 10px;cursor:pointer;"
          onmouseenter="this.style.background='#f3f4f6'" onmouseleave="this.style.background='#f9fafb'">+ Bullet</button>
      </div>
      <textarea id="edit-textarea" spellcheck="false">${escapeHtml(content)}</textarea>
    </div>`

  const ta = document.getElementById('edit-textarea')
  ta.focus()

  // Autosave: write to disk 2s after last keystroke, no git
  ta.addEventListener('input', () => {
    document.getElementById('save-status').textContent = 'Unsaved'
    document.getElementById('save-status').style.color = '#f59e0b'
    clearTimeout(autosaveTimer)
    autosaveTimer = setTimeout(() => autosave(rel), 2000)
  })

  // Cmd/Ctrl+S — will become a checkpoint commit in step 4
  ta.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault()
      clearTimeout(autosaveTimer)
      autosave(rel)
    }
  })
}

async function autosave(rel) {
  const ta = document.getElementById('edit-textarea')
  if (!ta) return
  const content = ta.value
  const status = document.getElementById('save-status')
  if (status) { status.textContent = 'Saving…'; status.style.color = '#9ca3af' }

  try {
    const res = await fetch('/api/save-file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_path: rel, content })
    })
    if (!res.ok) throw new Error((await res.json()).error)
    files[rel] = content
    if (status) { status.textContent = 'Saved'; status.style.color = '#22c55e' }
  } catch (err) {
    if (status) { status.textContent = 'Save failed'; status.style.color = '#ef4444' }
  }
}

function insertSection() {
  const ta = document.getElementById('edit-textarea')
  const pos = ta.selectionStart
  const before = ta.value.slice(0, pos)
  const after = ta.value.slice(pos)
  const insert = '\n\n## New Section\n\n'
  ta.value = before + insert + after
  const newPos = before.length + insert.length
  ta.setSelectionRange(newPos, newPos)
  ta.focus()
  // Select "New Section" so user can immediately type the name
  const sectionStart = before.length + 4  // after '\n\n## '
  ta.setSelectionRange(sectionStart, sectionStart + 'New Section'.length)
}

function insertBullet() {
  const ta = document.getElementById('edit-textarea')
  const pos = ta.selectionStart
  const before = ta.value.slice(0, pos)
  const after = ta.value.slice(pos)
  const insert = '\n- '
  ta.value = before + insert + after
  const newPos = before.length + insert.length
  ta.setSelectionRange(newPos, newPos)
  ta.focus()
}


// ── New file ──────────────────────────────────────────────────────────────────
function toggleNewFileForm() {
  const form = document.getElementById('new-file-form')
  const visible = form.style.display !== 'none'
  form.style.display = visible ? 'none' : 'block'
  if (!visible) {
    document.getElementById('new-file-name').focus()
    document.getElementById('new-file-error').style.display = 'none'
  }
}

async function createFile() {
  const name = document.getElementById('new-file-name').value.trim()
  const location = document.querySelector('input[name="file-location"]:checked').value
  const errEl = document.getElementById('new-file-error')
  errEl.style.display = 'none'

  if (!name) { errEl.textContent = 'Name is required.'; errEl.style.display = 'block'; return }

  try {
    const res = await fetch('/api/new-file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, location })
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error)

    files[data.relPath] = data.content
    document.getElementById('new-file-name').value = ''
    toggleNewFileForm()
    renderFilesNav()
    selectFile(data.relPath)
    enterEditMode(data.relPath)
  } catch (err) {
    errEl.textContent = err.message
    errEl.style.display = 'block'
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function showCallDetail(call) {
  const date = new Date(call.timestamp).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
  const appliedEdits = call.applied_edits || []
  const byFile = groupByFile(appliedEdits)

  const changesHtml = appliedEdits.length
    ? `<div style="margin-bottom:24px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #d1d5db;">Changes Applied</div>
        ${Object.entries(byFile).map(([filePath, edits]) => `
          <div style="margin-bottom:16px;">
            <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px;">${filePath}</div>
            ${edits.map(e => `
              <div class="ver-diff-row" style="margin-bottom:6px;">
                <div style="font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;">${e.field_label}</div>
                <div style="font-family:monospace;font-size:12px;color:#991b1b;text-decoration:line-through;margin-bottom:2px;white-space:pre-wrap;word-break:break-word;">${e.old_value}</div>
                <div style="font-family:monospace;font-size:12px;color:#166534;white-space:pre-wrap;word-break:break-word;">${e.new_value}</div>
                ${e.source_quote ? `<div style="font-size:11px;color:#9ca3af;font-style:italic;margin-top:4px;">"${e.source_quote}"</div>` : ''}
              </div>`).join('')}
          </div>`).join('')}
      </div>`
    : call.status === 'pending'
    ? `<div style="font-size:13px;color:#9ca3af;margin-bottom:24px;">Proposed — not yet applied.</div>`
    : `<div style="font-size:13px;color:#9ca3af;margin-bottom:24px;">No changes recorded.</div>`

  document.getElementById('content').innerHTML = `
    <div style="max-width:640px;">
      <h2 style="font-size:20px;font-weight:400;margin-bottom:4px;">${call.name}</h2>
      <div style="font-size:12px;color:#9ca3af;margin-bottom:24px;">
        ${date}
        · ${call.edits?.length || 0} proposed
        · ${appliedEdits.length} applied
        · <strong style="color:${call.status === 'applied' ? '#16a34a' : '#d97706'}">${call.status}</strong>
        ${call.commit_hash ? `· <span style="font-family:monospace">${call.commit_hash}</span>` : ''}
      </div>
      ${changesHtml}
    </div>`
}

function renderPEModuleReadOnly(edits) {
  const byFile = groupByFile(edits)
  const fileBlocksHtml = Object.entries(byFile).map(([filePath, fileEdits]) => {
    const editsHtml = fileEdits.map(e => `
      <span class="pe-edit-label">${e.field_label}</span>
      <span class="pe-edit-removed">- ${e.old_value}</span>
      <span class="pe-edit-added">+ ${e.new_value}</span>
    `).join('')
    return `
      <div class="pe-file-block">
        <div class="pe-file-header">
          <span class="pe-file-name">${filePath}</span>
          <span style="font-size:11px;color:#9ca3af;">${fileEdits.length} edit(s)</span>
        </div>
        <div class="pe-edits-body">${editsHtml}</div>
      </div>`
  }).join('')
  return `<div class="pe-module">${fileBlocksHtml}</div>`
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open')
  document.getElementById('transcript-input').focus()
}

function handleDragOver(e) {
  e.preventDefault()
  const zone = document.getElementById('drop-zone')
  zone.style.borderColor = '#93c5fd'
  zone.style.background = '#f0f9ff'
}

function handleDragLeave(e) {
  const zone = document.getElementById('drop-zone')
  zone.style.borderColor = '#e5e7eb'
  zone.style.background = ''
}

function handleDrop(e) {
  e.preventDefault()
  handleDragLeave(e)
  const file = e.dataTransfer.files[0]
  if (file) loadFile(file)
}

function handleFileSelect(e) {
  const file = e.target.files[0]
  if (file) loadFile(file)
}

function loadFile(file) {
  if (!file.name.endsWith('.txt')) {
    document.getElementById('modal-status').textContent = 'Only .txt files are supported.'
    return
  }
  const reader = new FileReader()
  reader.onload = e => {
    document.getElementById('transcript-input').value = e.target.result
    document.getElementById('drop-label').textContent = `✓ ${file.name}`
    document.getElementById('drop-zone').style.borderColor = '#22c55e'
    document.getElementById('drop-zone').style.background = '#f0fdf4'
    // Auto-fill call name from filename if empty
    const nameInput = document.getElementById('call-name-input')
    if (!nameInput.value) {
      nameInput.value = file.name.replace(/\.txt$/, '').replace(/-/g, ' ').replace(/_/g, ' ')
    }
  }
  reader.readAsText(file)
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open')
  document.getElementById('modal-status').textContent = ''
}

// Close on backdrop click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal()
})

// ── Extraction ────────────────────────────────────────────────────────────────
async function runExtraction() {
  const transcript = document.getElementById('transcript-input').value.trim()
  const callName   = document.getElementById('call-name-input').value.trim()
  if (!transcript) {
    document.getElementById('modal-status').textContent = 'Please paste a transcript first.'
    return
  }

  const btn = document.getElementById('extract-btn')
  const status = document.getElementById('modal-status')

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'
  status.textContent = 'Analyzing transcript...'

  try {
    const callDate = document.getElementById('call-date-input').value || null
    const res = await fetch('/api/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript, callName, callDate })
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Extraction failed')

    closeModal()
    document.getElementById('transcript-input').value = ''
    document.getElementById('call-name-input').value = ''
    document.getElementById('call-date-input').value = ''
    document.getElementById('drop-label').textContent = 'Drop a .txt file here, or click to browse'
    document.getElementById('drop-zone').style.borderColor = '#e5e7eb'
    document.getElementById('drop-zone').style.background = ''

    pendingEdits   = data.edits
    currentCallId  = data.callId
    peFileStates   = {}

    await loadCalls()
    renderReviewScreen(data)

  } catch (err) {
    status.textContent = `Error: ${err.message}`
  } finally {
    btn.disabled = false
    btn.textContent = 'Extract edits'
  }
}

// ── Review screen ─────────────────────────────────────────────────────────────
function groupByFile(edits) {
  const byFile = {}
  for (const edit of edits) {
    if (!byFile[edit.file_path]) byFile[edit.file_path] = []
    byFile[edit.file_path].push(edit)
  }
  return byFile
}

function renderReviewScreen(data) {
  const validEdits   = data.edits.filter(e => e._valid)
  const invalidEdits = data.edits.filter(e => !e._valid)

  if (!validEdits.length && !invalidEdits.length) {
    document.getElementById('content').innerHTML = `
      <div style="max-width:640px;margin-top:40px;text-align:center;color:#9ca3af;font-size:13px;">
        No edits proposed for this transcript.
      </div>`
    return
  }

  const byFile = groupByFile(validEdits)
  const fileIds = Object.keys(byFile)

  // Initialize all file states as pending
  fileIds.forEach(f => { if (!peFileStates[f]) peFileStates[f] = 'pending' })

  const fileBlocksHtml = fileIds.map(filePath => renderFileBlock(filePath, byFile[filePath])).join('')

  document.getElementById('content').innerHTML = `
    <div style="max-width:640px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
        <h2 style="font-size:20px;font-weight:400;">Proposed Edits</h2>
        <span style="font-size:12px;color:#9ca3af;">${data.token_count?.toLocaleString()} tokens</span>
      </div>
      <div style="font-size:12px;color:#9ca3af;margin-bottom:24px;">${fileIds.length} file(s) · ${validEdits.length} edit(s)</div>

      <div class="pe-module" id="pe-module">
        <div class="pe-module-header">
          <div style="font-size:12px;color:#6b7280;">AI extracted changes from this call</div>
          <div style="display:flex;gap:6px;">
            <button class="pe-accept-btn" style="padding:4px 12px;font-size:12px;" onclick="acceptAll()">Accept all</button>
            <button class="pe-skip-btn"   style="padding:4px 10px;font-size:12px;" onclick="dismissAll()">Dismiss all</button>
          </div>
        </div>
        <div id="pe-file-blocks">${fileBlocksHtml}</div>
      </div>

      <div id="apply-bar" style="display:flex;align-items:center;gap:10px;margin-top:16px;">
        <button id="apply-btn" onclick="applyAccepted()"
          style="background:#16a34a;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;">
          Apply accepted edits
        </button>
        <div id="apply-status" style="font-size:12px;color:#9ca3af;"></div>
      </div>

      ${invalidEdits.length ? `
        <div style="margin-top:24px;padding:12px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;">
          <strong>${invalidEdits.length} edit(s) skipped</strong> — old_value not found in file or hallucinated path:
          <ul style="margin-top:6px;padding-left:16px;">
            ${invalidEdits.map(e => `<li>${e.file_path} — "${e.old_value?.slice(0, 60)}…"</li>`).join('')}
          </ul>
        </div>` : ''}
    </div>`
}

function renderFileBlock(filePath, edits) {
  const state = peFileStates[filePath] || 'pending'
  const editsHtml = edits.map(e => {
    const confClass = `conf-${e.confidence}`
    return `
      <span class="pe-edit-label">
        ${e.field_label}
        <span class="badge ${confClass}" style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500;margin-left:6px;">${e.confidence}</span>
      </span>
      <span class="pe-edit-removed">- ${e.old_value}</span>
      <span class="pe-edit-added">+ ${e.new_value}</span>
      ${e.source_quote ? `<span style="display:block;padding:4px 14px 6px;font-size:11px;color:#9ca3af;font-style:italic;">"${e.source_quote}"</span>` : ''}`
  }).join('')

  const badge = state === 'accepted'
    ? `<span style="font-size:11px;color:#16a34a;font-weight:500;">✓ Accepted</span>`
    : state === 'skipped'
    ? `<span style="font-size:11px;color:#9ca3af;">Skipped</span>`
    : `<button class="pe-accept-btn" onclick="peAccept('${filePath}')">Accept</button>
       <button class="pe-skip-btn"   onclick="peSkip('${filePath}')">Skip</button>`

  return `
    <div class="pe-file-block pe-file-${state}" id="pe-block-${CSS.escape(filePath)}">
      <div class="pe-file-header">
        <span class="pe-file-name">${filePath}</span>
        ${badge}
      </div>
      <div class="pe-edits-body">${state === 'pending' ? editsHtml : ''}</div>
    </div>`
}

function peAccept(filePath) {
  peFileStates[filePath] = 'accepted'
  rerenderFileBlock(filePath)
}

function peSkip(filePath) {
  peFileStates[filePath] = 'skipped'
  rerenderFileBlock(filePath)
}

function acceptAll() {
  const validEdits = pendingEdits.filter(e => e._valid)
  groupByFile(validEdits)
  Object.keys(groupByFile(validEdits)).forEach(f => { peFileStates[f] = 'accepted' })
  rerenderAllBlocks()
}

function dismissAll() {
  const validEdits = pendingEdits.filter(e => e._valid)
  Object.keys(groupByFile(validEdits)).forEach(f => { peFileStates[f] = 'skipped' })
  rerenderAllBlocks()
}

function rerenderFileBlock(filePath) {
  const validEdits = pendingEdits.filter(e => e._valid)
  const byFile = groupByFile(validEdits)
  const el = document.getElementById(`pe-block-${CSS.escape(filePath)}`)
  if (el) el.outerHTML = renderFileBlock(filePath, byFile[filePath])
}

function rerenderAllBlocks() {
  const validEdits = pendingEdits.filter(e => e._valid)
  const byFile = groupByFile(validEdits)
  document.getElementById('pe-file-blocks').innerHTML =
    Object.keys(byFile).map(f => renderFileBlock(f, byFile[f])).join('')
}

// ── Apply ─────────────────────────────────────────────────────────────────────
async function applyAccepted() {
  const acceptedFilePaths = Object.entries(peFileStates)
    .filter(([, s]) => s === 'accepted')
    .map(([f]) => f)

  if (!acceptedFilePaths.length) {
    document.getElementById('apply-status').textContent = 'Accept at least one file first.'
    return
  }

  const editsToApply = pendingEdits.filter(e => e._valid && acceptedFilePaths.includes(e.file_path))
  // Strip internal _valid/_error fields before sending
  const cleanEdits = editsToApply.map(({ _valid, _error, ...rest }) => rest)

  const btn = document.getElementById('apply-btn')
  const status = document.getElementById('apply-status')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> Applying...'
  status.textContent = ''

  try {
    const res = await fetch('/api/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ callId: currentCallId, edits: cleanEdits })
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Apply failed')

    // Refresh local file cache
    files = data.files

    const commitMsg = data.commitHash ? ` · commit ${data.commitHash}` : ''
    status.innerHTML = `<span style="color:#16a34a;">✓ ${data.applied} edit(s) applied${commitMsg}</span>`
    btn.style.display = 'none'

    await loadCalls()
    renderFilesNav()

    // If a file is currently open, refresh it
    if (currentFile) renderFileContent(currentFile)

  } catch (err) {
    status.textContent = `Error: ${err.message}`
  } finally {
    btn.disabled = false
    if (btn.style.display !== 'none') btn.textContent = 'Apply accepted edits'
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init()
</script>
